name: Merged APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: merged-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build merged APK
    runs-on: ubuntu-latest
    env:
      CI_VERSION_CODE: ${{ github.run_number }}
      CI_VERSION_NAME: 1.0.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.CI_VERSION_NAME }}
          path: app/build/outputs/apk/release/*.apk
